# ───────────────────────────────────────────────────────
# Deploy to Vercel
#
# 自動部署方式（建議）：
#   1. 到 https://vercel.com 匯入本 GitHub repo
#   2. Vercel 會自動在每次 push main 時部署
#   3. 不需此 workflow
#
# 若仍需手動觸發部署（例如用自訂 script），可啟用以下步驟：
#   - 設定 GitHub secret: VERCEL_TOKEN
#   - 解除下方註解
# ───────────────────────────────────────────────────────

name: Deploy to Vercel
on:
  workflow_dispatch:  # 手動觸發

# 啟用方式：
# 1. 在 Vercel 產生 token: https://vercel.com/account/tokens
# 2. 加到 GitHub repo secrets: Settings → Secrets → VERCEL_TOKEN
# 3. 取消下方 jobs 區塊的註解
